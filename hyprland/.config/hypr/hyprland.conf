autogenerated = 0 # remove this line to remove the warning

################
### MONITORS ###
################

monitor=DP-1,1920x1200@60,0x0,1
monitor=HDMI-A-1,2560x1080@75,1920x0,1
monitor=eDP-1,2560x1600@240,4480x0,1


###################
### MY PROGRAMS ###
###################

$terminal = wezterm
$fileManager = dolphin
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# exec-once = aw-qt --no-gui
exec-once = thorium-browser
exec-once = hyprlock
exec-once = solaar --window=hide
exec-once = mako
exec-once = flameshot
exec-once = copyq
exec-once = redshift
exec-once = nm-applet --indicator
exec-once = hyprpaper
exec-once = waybar
exec-once = localsend --hidden
exec-once = hypridle
exec-once = wl-clip-persist --clipboard regular
# exec-once = bitwarden-desktop autostart
exec-once = hyprctl dispatch focusmonitor HDMI-A-1
exec-once=wlsunset -l -23.55 -L -46.64 -T 5500 -t 4500


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XCOMPOSEFILE,~/.XCompose


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 4

    border_size = 1

    col.active_border = rgb(353b45)
    col.inactive_border = rgb(282c34)

    resize_on_border = false

    allow_tearing = false

    layout = master
}

decoration {
    rounding = 10

    active_opacity = 0.99
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

bind = ALT, left,  exec, ~/.config/hypr/scripts/rotate-workspaces.sh --rotate
bind = ALT, right, exec, ~/.config/hypr/scripts/rotate-workspaces.sh --rotate-reverse

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    layers_hog_keyboard_focus = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 200
    repeat_rate = 100

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

bind = ALT, RETURN, exec, wezterm
bind = ALT, B, exec, $HOME/.config/waybar/launch_waybar
bind = ALT, Q, killactive,
bind = SHIFT ALT, Q, exit,
bind = ALT, W, exec, thorium-browser 
bind = ALT, E, exec, $fileManager
bind = ALT, S, togglefloating
bind = ALT, SPACE, exec, $menu
bind = ALT, T, pseudo,
bind = ALT, J, togglesplit,
bind = ALT, M, fullscreen, 0

bind = ALT, left, movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up, movefocus, u
bind = ALT, down, movefocus, d

bind = ALT, G, submap, mousemode

submap = mousemode
bind = ALT, G, submap, reset
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow
submap = reset

bind = ALT, Tab, cyclenext, 
bind = ALT, Tab, bringactivetotop,

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10
bind = ALT, dead_grave, workspace, 11
bind = ALT, minus, workspace, 12

bind = ALT, h, movefocus, l
bind = ALT, l, movefocus, r
bind = ALT, k, movefocus, u
bind = ALT, j, movefocus, d

workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
workspace = 11, monitor:DP-1
workspace = 12, monitor:eDP-1

bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10
bind = ALT SHIFT, dead_grave, movetoworkspace, 11
bind = ALT SHIFT, minus, movetoworkspace, 12

bind = ALT, S, togglespecialworkspace, magic
bind = ALT SHIFT, S, movetoworkspace, special:magic

bind = ALT, mouse_down, workspace, e+1
bind = ALT, mouse_up, workspace, e-1

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = ALT, P, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/screenshots/screenshot-$(date +%F_%T).png | dunstify "Screenshot of the region taken" -t 5000 # screenshot of a region 
bind = ALT SHIFT, P, exec, grim -o "$(hyprctl activeworkspace | head -n1 | awk -F'on monitor ' '{print $2}' | cut -d':' -f1)" - | wl-copy && wl-paste > ~/Pictures/screenshots/screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 5000 # screenshot of the whole screen

bind = ALT, F1, exec, hyprctl dispatch dpms toggle DP-1
bind = ALT, F2, exec, hyprctl dispatch dpms toggle HDMI-A-1
bind = ALT, F3, exec, hyprctl dispatch dpms toggle eDP-1

bind = SUPER, L, exec, hyprlock

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = match:class discord, workspace 12 silent
windowrule = match:class spotify, workspace 5 silent
windowrule = match:class steam, workspace 7 silent
